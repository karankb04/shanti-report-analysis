<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapport SEO &amp; Trafic — Shanti Travel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,560;9..144,640&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F5F0; --card:#FFFFFF; --ink:#20303A; --ink2:#46555E;
  --muted:#75818A; --line:#E5E0D5; --line2:#EFEBE2;
  --teal:#14635C; --teal-soft:#E3EEEC; --gold:#B98A24; --gold-soft:#F6EEDC;
  --up:#177A52; --up-soft:#E4F2EB; --down:#BC4A33; --down-soft:#F8E9E5;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Archivo',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums}

/* ---------- top bar ---------- */
/* ---------- top bar row 1: branding + month ---------- */
header{position:sticky;top:0;z-index:50;background:rgba(247,245,240,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar-row1{max-width:1240px;margin:0 auto;padding:11px 24px 0;display:flex;align-items:center;gap:16px}
.brand{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.brand .eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:600}
.brand h1{font-family:'Fraunces',serif;font-weight:560;font-size:19px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand h1 em{font-style:italic;color:var(--teal)}
.month-switch{display:flex;border:1px solid var(--line);border-radius:999px;background:var(--card);padding:3px;box-shadow:0 1px 2px rgba(32,48,58,.05);flex-shrink:0}
.month-switch button{appearance:none;border:0;background:transparent;font-family:'Archivo';font-size:12.5px;font-weight:600;color:var(--muted);padding:6px 16px;border-radius:999px;cursor:pointer;transition:all .18s}
.month-switch button.active{background:var(--ink);color:#fff}
.month-switch button:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

/* ---------- top bar row 2: page tabs ---------- */
.topbar-row2{max-width:1240px;margin:0 auto;padding:0 20px;display:flex;align-items:flex-end;gap:1px;overflow-x:auto;scrollbar-width:none}
.topbar-row2::-webkit-scrollbar{display:none}
.page-tab{appearance:none;border:0;background:transparent;font-family:'Archivo';font-size:12px;font-weight:600;color:var(--muted);padding:9px 14px 10px;cursor:pointer;white-space:nowrap;border-radius:6px 6px 0 0;transition:color .15s,background .15s;letter-spacing:.01em;flex-shrink:0}
.page-tab:hover{color:var(--ink);background:rgba(32,48,58,.05)}
.page-tab.active{background:var(--teal);color:#fff}
.page-tab:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

/* ---------- page container ---------- */
.pages{max-width:1240px;margin:0 auto;padding:0 24px}
.page{display:none;min-height:calc(100vh - 90px);padding:26px 0 60px}
.page.active{display:block}

/* ---------- sections inside pages ---------- */
section{margin-bottom:0}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.sec-head h2{font-family:'Fraunces',serif;font-weight:560;font-size:24px;letter-spacing:-.01em}
.sec-head .src{font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;font-weight:600}
.sec-sub{color:var(--ink2);font-size:13px;margin-bottom:16px;max-width:760px}

/* ---------- cards & grids ---------- */
.grid{display:grid;gap:14px;min-width:0}
.grid>*{min-width:0}
.kpis{grid-template-columns:repeat(auto-fit,minmax(155px,1fr))}
.kpis.six{grid-template-columns:repeat(3,1fr)}
@media(max-width:760px){.kpis.six{grid-template-columns:repeat(2,1fr)}}
.stamps{margin:10px 0 18px}
.cols-2{grid-template-columns:1fr 1fr}
.cols-3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:880px){.cols-2,.cols-3{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:0 1px 2px rgba(32,48,58,.04)}
.card h3{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px}
.card h3 .hint{letter-spacing:0;text-transform:none;font-weight:500;color:#9AA3AA;float:right}

/* KPI */
.kpi .label{font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600}
.kpi .value{font-family:'Fraunces',serif;font-weight:560;font-size:29px;letter-spacing:-.015em;margin:5px 0 4px}
.kpi .value small{font-size:15px;color:var(--ink2);font-family:'Archivo';font-weight:500}
.delta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:2px 8px;border-radius:999px}
.delta.good{color:var(--up);background:var(--up-soft)}
.delta.bad{color:var(--down);background:var(--down-soft)}
.delta.flat{color:var(--muted);background:var(--line2)}
.delta .vs{font-weight:500;color:inherit;opacity:.65}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:left;padding:7px 8px;border-bottom:1px solid var(--line)}
td{padding:7px 8px;border-bottom:1px solid var(--line2);vertical-align:middle}
tr:last-child td{border-bottom:0}
td.r,th.r{text-align:right}
td.path{font-size:12.5px;color:var(--ink2);max-width:330px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl-scroll{max-height:430px;overflow:auto;border:1px solid var(--line2);border-radius:8px}
.tbl-scroll table{font-size:12.5px}
.tbl-scroll thead th{position:sticky;top:0;background:var(--card);z-index:2}
.chip{display:inline-block;font-size:10.5px;font-weight:600;padding:1px 8px;border-radius:999px;letter-spacing:.03em}
.chip.brand{background:var(--gold-soft);color:var(--gold)}
.chip.nb{background:var(--teal-soft);color:var(--teal)}
.mv{font-weight:600;font-size:12px}
.mv.up{color:var(--up)} .mv.down{color:var(--down)} .mv.flat{color:var(--muted)}
.newkw{font-size:10px;font-weight:700;color:var(--teal);letter-spacing:.06em}

/* bars */
.hbar-row{display:grid;grid-template-columns:128px 1fr 64px;align-items:center;gap:10px;padding:4px 0}
.hbar-row .lab{font-size:12.5px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-row .val{font-size:12.5px;font-weight:600;text-align:right}
.hbar{height:9px;border-radius:99px;background:var(--line2);overflow:hidden}
.hbar i{display:block;height:100%;border-radius:99px;background:var(--teal)}
.hbar i.alt{background:var(--gold)}

/* freshness */
.stamps{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 18px}
.stamp{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 13px;font-size:11.5px;color:var(--ink2)}
.stamp b{color:var(--ink);font-weight:600}
.stamp .dot{width:7px;height:7px;border-radius:50%}
.dot.ok{background:var(--up)} .dot.live{background:var(--teal)} .dot.off{background:#C2BBAA}

/* notes & empty */
.note{display:flex;gap:9px;align-items:flex-start;background:var(--gold-soft);border:1px solid #EAD9AE;border-radius:10px;padding:10px 13px;font-size:12.5px;color:#6F5413;margin-top:12px}
.note b{font-weight:700}
.note .tag{flex:none;font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);border-radius:4px;padding:2px 6px;margin-top:1px}
.nodata{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:34px 18px;border:1.5px dashed var(--line);border-radius:10px;color:var(--muted);text-align:center;background:repeating-linear-gradient(-45deg,transparent,transparent 9px,rgba(32,48,58,.018) 9px,rgba(32,48,58,.018) 18px)}
.nodata b{font-size:13.5px;color:var(--ink2);font-weight:600}
.nodata span{font-size:12px;max-width:380px}
.foot{font-size:11px;color:var(--muted);margin-top:10px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--ink2);margin-top:10px}
.legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:-1px}
svg text{font-family:'Archivo',sans-serif}
footer{max-width:1240px;margin:0 auto;padding:0 24px 40px;color:var(--muted);font-size:11.5px;border-top:0}
@media print{header{position:static}}
@media (prefers-reduced-motion: reduce){html{scroll-behavior:auto}}
</style>
</head>
<body>
<div id="loadingScreen" style="position:fixed;inset:0;background:var(--paper);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite"></div>
  <p style="color:var(--ink2);font-size:14px">Chargement du rapport…</p>
  <span style="color:var(--muted);font-size:12px" id="loadStatus">Connexion au Google Sheet…</span>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}.err-box{background:#FEF2F0;border:1px solid #F5C6C0;border-radius:10px;padding:18px 22px;color:#7A2E24;max-width:560px;text-align:center;line-height:1.6}.err-box b{font-weight:700;display:block;margin-bottom:6px}</style>
<header>
  <div class="topbar-row1">
    <div class="brand">
      <span class="eyebrow">Shanti Travel · shantitravel.com</span>
      <h1>Rapport mensuel <em>SEO &amp; Trafic</em></h1>
    </div>
    <div class="month-switch" role="tablist" aria-label="Sélection du mois" id="monthSwitch"></div>
  </div>
  <div class="topbar-row2" id="pageTabs" role="tablist" aria-label="Pages du rapport"></div>
</header>

<div class="pages" id="pages"></div>
<footer id="pagefoot"></footer>
<script>

/* ================================================================
   CONFIG — only thing that changes is the SHEET_ID each year
   ================================================================ */
const SHEET_ID = '18Hb5VIvNsbSRuVh9PNbhNlQ5PwI5AF5Zt_zlVaGDZ8w';

/* ================================================================
   FETCH FROM GOOGLE SHEET (published JSON API)
   ================================================================ */
async function fetchTab(tabName){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Tab not found: '+tabName);
  const text = await res.text();
  // Google wraps response in /*O_o*/ google.visualization.Query.setResponse(...)
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json;
}

/* Read an entire tab as array of {month,label,json} rows, parse the json column */
async function fetchTabRows(tabName){
  try {
    const gviz = await fetchTab(tabName);
    const rows = gviz.table.rows || [];
    const out = {};
    rows.forEach(function(r){
      if(!r.c || !r.c[0] || !r.c[0].v) return;
      const month = String(r.c[0].v);
      const label = r.c[1] && r.c[1].v ? String(r.c[1].v) : month;
      const jsonCell = r.c[2] && r.c[2].v ? r.c[2].v : null;
      if(jsonCell){
        try { out[month] = Object.assign({label:label}, JSON.parse(jsonCell)); }
        catch(e){ console.warn('bad json in', tabName, month, e); }
      }
    });
    return out;
  } catch(e){
    console.warn('fetchTabRows failed for', tabName, e);
    return {};
  }
}

/* Read the single-row shared tab */
async function fetchShared(){
  try {
    const gviz = await fetchTab('shared');
    const rows = gviz.table.rows || [];
    // header row is row 0 in values but gviz strips it; data is first row
    for(var i=0;i<rows.length;i++){
      var cell = rows[i].c && rows[i].c[0] && rows[i].c[0].v;
      if(cell && String(cell).charAt(0)==='{'){ return JSON.parse(cell); }
    }
    return null;
  } catch(e){ console.warn('shared fetch failed', e); return null; }
}

/* ================================================================
   DATA STORE — one fetch per source tab, all months at once
   ================================================================ */
let MONTHS = [];   // [{key:'2026-05', label:'Mai 2026'}, ...]
let STORE  = {};   // {vercel:{month:data}, gsc:{...}, ahrefs:{...}, kw:{...}, ai:{...}, shared:{...}}
let CACHE  = {};   // key → assembled month object

async function loadAllData(){
  setStatus('Lecture des onglets de données…');
  const results = await Promise.all([
    fetchTabRows('vercel'),
    fetchTabRows('gsc'),
    fetchTabRows('ahrefs'),
    fetchTabRows('keywords'),
    fetchTabRows('ai'),
    fetchShared()
  ]);
  STORE = { vercel:results[0], gsc:results[1], ahrefs:results[2], kw:results[3], ai:results[4], shared:results[5] };
}

function loadMonth(key){
  if(CACHE[key]) return CACHE[key];
  const obj = { month:key,
    label: (STORE.vercel[key]&&STORE.vercel[key].label) || (STORE.gsc[key]&&STORE.gsc[key].label) || key,
    generated: (STORE.gsc[key]&&STORE.gsc[key].generated) || new Date().toLocaleDateString('fr-FR'),
    stamps: (STORE.gsc[key]&&STORE.gsc[key].stamps) || {},
    vercel: STORE.vercel[key] || null,
    gsc:    STORE.gsc[key] || null,
    ahrefs: STORE.ahrefs[key] || null,
    kw:     STORE.kw[key] || null,
    ai:     STORE.ai[key] || null,
    shared: STORE.shared };
  CACHE[key] = obj;
  return obj;
}


/* ================================================================
   RENDER HELPERS & SECTION RENDERERS — exact copy from v1
   ================================================================ */
/* ============================================================
   RENDU
   ============================================================ */
const fmt = n => n==null ? "—" : new Intl.NumberFormat("fr-FR").format(n);
const fmtPct = (n,d=2) => n==null ? "—" : n.toLocaleString("fr-FR",{minimumFractionDigits:d,maximumFractionDigits:d}) + " %";
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");

/* delta: invert=true means a decrease is good (bounce, position) */
function delta(cur, prev, {invert=false, pts=false, dec=1, prevLabel=""}={}){
  if(cur==null || prev==null) return '<span class="delta flat">— <span class="vs">vs ' + prevLabel + '</span></span>';
  const diff = cur - prev;
  if (Math.abs(diff) < 1e-9) return '<span class="delta flat">= <span class="vs">vs ' + prevLabel + '</span></span>';
  const good = invert ? diff < 0 : diff > 0;
  const arrow = diff > 0 ? "▲" : "▼";
  let txt;
  if (pts) txt = (diff>0?"+":"") + diff.toLocaleString("fr-FR",{maximumFractionDigits:dec}) + " pt";
  else txt = (diff>0?"+":"") + (diff/prev*100).toLocaleString("fr-FR",{maximumFractionDigits:dec}) + " %";
  return '<span class="delta ' + (good?"good":"bad") + '">' + arrow + ' ' + txt + ' <span class="vs">vs ' + prevLabel + '</span></span>';
}
function kpiCard(label, valueHtml, deltaHtml){
  return '<div class="card kpi"><div class="label">' + label + '</div><div class="value num">' + valueHtml + '</div>' + (deltaHtml||"") + '</div>';
}
function noData(extra){
  return '<div class="nodata"><b>Données non disponibles</b><span>' + (extra||"Aucune donnée pour ce mois dans la source.") + '</span></div>';
}
function hbars(rows, max, alt){
  return rows.map(r => {
    const w = max ? Math.max(1.2, r.v/max*100) : 0;
    return '<div class="hbar-row"><div class="lab" title="'+esc(r.l)+'">'+esc(r.l)+'</div><div class="hbar"><i'+(alt?' class="alt"':'')+' style="width:'+w+'%"></i></div><div class="val num">'+r.txt+'</div></div>';
  }).join("");
}
function donut(parts, size=132){
  const total = parts.reduce((s,p)=>s+p.v,0); if(!total) return "";
  const cols = ["#14635C","#B98A24","#7FA8A1","#D8C28A","#46555E"];
  const r=46, c=size/2, circ=2*Math.PI*r; let off=0, segs="";
  parts.forEach((p,i)=>{
    const len = p.v/total*circ;
    segs += '<circle r="'+r+'" cx="'+c+'" cy="'+c+'" fill="none" stroke="'+cols[i%cols.length]+'" stroke-width="15" stroke-dasharray="'+(len-1.5)+' '+(circ-len+1.5)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+c+' '+c+')"/>';
    off += len;
  });
  const legend = parts.map((p,i)=>'<div><i style="background:'+cols[i%cols.length]+'"></i>'+esc(p.l)+' · <b class="num">'+p.txt+'</b></div>').join("");
  return '<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap"><svg width="'+size+'" height="'+size+'" role="img">'+segs+'</svg><div class="legend" style="flex-direction:column;gap:7px">'+legend+'</div></div>';
}
function sparkline(points, activeIdx){
  const w=300,h=86,p=14;
  const vs=points.map(d=>d.v), min=Math.min(...vs), max=Math.max(...vs), span=(max-min)||1;
  const x=i=>p+i*(w-2*p)/(points.length-1), y=v=>h-p-(v-min)/span*(h-2*p-12);
  const path=points.map((d,i)=>(i?"L":"M")+x(i)+","+y(d.v)).join(" ");
  const dots=points.map((d,i)=>'<circle cx="'+x(i)+'" cy="'+y(d.v)+'" r="'+(i===activeIdx?5:3.5)+'" fill="'+(i===activeIdx?"#B98A24":"#14635C")+'"/>' +
    '<text x="'+x(i)+'" y="'+(h-1)+'" text-anchor="middle" font-size="10" fill="#75818A">'+d.m+'</text>' +
    '<text x="'+x(i)+'" y="'+(y(d.v)-9)+'" text-anchor="middle" font-size="10.5" font-weight="600" fill="#20303A" class="num">'+fmt(d.v)+'</text>').join("");
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'"><path d="'+path+'" fill="none" stroke="#14635C" stroke-width="2.2" stroke-linecap="round"/>'+dots+'</svg>';
}
function stackedBuckets(b, prev){
  const mk=(o,lab)=>{
    const tot=o.top3+o.mid+o.low;
    const seg=(v,c)=>'<i style="display:inline-block;height:100%;width:'+(v/tot*100)+'%;background:'+c+'"></i>';
    return '<div style="margin-bottom:13px"><div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:4px"><span>'+lab+'</span><span class="num">'+fmt(tot)+' mots-clés</span></div>' +
      '<div style="height:18px;border-radius:6px;overflow:hidden;display:flex">'+seg(o.top3,"#14635C")+seg(o.mid,"#7FA8A1")+seg(o.low,"#D8D2C2")+'</div>' +
      '<div class="legend"><div><i style="background:#14635C"></i>Top 3 · <b class="num">'+fmt(o.top3)+'</b></div><div><i style="background:#7FA8A1"></i>4–10 · <b class="num">'+fmt(o.mid)+'</b></div><div><i style="background:#D8D2C2"></i>11+ · <b class="num">'+fmt(o.low)+'</b></div></div></div>';
  };
  return (prev?mk(prev,"Mois précédent"):"") + mk(b,"Mois sélectionné");
}
function moveChip(cur, prev){
  if(prev==null) return '<span class="newkw">NOUVEAU</span>';
  const d = prev - cur; /* positif = gain de positions */
  if(d===0) return '<span class="mv flat">=</span>';
  return d>0 ? '<span class="mv up">▲ '+d+'</span>' : '<span class="mv down">▼ '+Math.abs(d)+'</span>';
}

function stampsBar(s){
  const it=(dot,name,val)=>'<span class="stamp"><span class="dot '+dot+'"></span>'+name+' · <b>'+val+'</b></span>';
  return '<div class="stamps">' +
    it("ok","Vercel", s.vercel) +
    it("live","Search Console", s.gsc) +
    it("live","Ahrefs", s.ahrefs) +
    it("off","GA4","non connecté") +
    '<span class="stamp"><span class="dot live"></span>Rapport généré le <b>'+SHARED.generated+'</b></span></div>';
}

/* ------------------ sections ------------------ */
function secOverview(d){
  const v=d.vercel, g=d.gsc, a=d.ahrefs, pv=v.prev, pg=g.prev, P=d.prevLabel;
  const ggl = v.referrers.find(r=>/google\.com/.test(r[0]));
  const triRows=[
    {l:"Impressions GSC", v:g.kpi.impressions, txt:fmt(g.kpi.impressions)},
    {l:"Clics organiques GSC", v:g.kpi.clicks, txt:fmt(g.kpi.clicks)},
    {l:"Trafic estimé Ahrefs", v:a.kpi.traffic, txt:fmt(a.kpi.traffic)},
    {l:"Visiteurs via google.com (Vercel)", v:ggl?ggl[1]:0, txt:fmt(ggl?ggl[1]:null)}
  ];
  const triMax = Math.max(g.kpi.clicks, a.kpi.traffic, ggl?ggl[1]:0); /* log-ish: impressions barre séparée */
  return `
  <section id="overview">
    <div class="sec-head"><h2>Vue d'ensemble</h2><span class="src">Toutes sources</span></div>
    ${stampsBar(d.stamps)}
    <div class="grid kpis six">
      ${kpiCard("Visiteurs uniques", fmt(v.kpi.visitors), delta(v.kpi.visitors, pv&&pv.visitors, {prevLabel:P}))}
      ${kpiCard("Pages vues", fmt(v.kpi.pageviews), delta(v.kpi.pageviews, pv&&pv.pageviews, {prevLabel:P}))}
      ${kpiCard("Taux de rebond", fmtPct(v.kpi.bounce,0), delta(v.kpi.bounce, pv&&pv.bounce, {invert:true, pts:true, prevLabel:P}))}
      ${kpiCard("Clics organiques", fmt(g.kpi.clicks), delta(g.kpi.clicks, pg&&pg.clicks, {prevLabel:P}))}
      ${kpiCard("Impressions", fmt(g.kpi.impressions), delta(g.kpi.impressions, pg&&pg.impressions, {prevLabel:P}))}

        <div class="tbl-scroll"><table><thead><tr><th>Mot-clé</th><th class="r">Volume</th><th class="r">Position</th><th>Fonctionnalité</th><th>Statut Shanti</th></tr></thead><tbody>
        ${kwRows}
        </tbody></table></div>
        <div class="foot">Position = meilleur rang organique de shantitravel.com. Fonctionnalité = type de résultat dominant dans la SERP. ★ = présence dans une fonctionnalité qui alimente les réponses IA.</div>
      </div>
    </div>

    <div class="grid cols-2" style="margin-top:14px">
      <div class="card"><h3>AI Share of Voice <span class="hint">ChatGPT · Gemini · Perplexity</span></h3>
        ${ai.brandRadar ? '' : noData("L'add-on Ahrefs Brand Radar AI n'est pas activé sur l'abonnement actuel (Standard). Cette section affichera le % de mentions de Shanti Travel vs concurrents dans ChatGPT, Gemini et Perplexity une fois l'add-on souscrit (à partir de 398 $/mois).")}
      </div>
      <div class="card"><h3>Trafic référé par les IA <span class="hint">chatgpt.com, perplexity.ai…</span></h3>
        ${ai.llmReferral ? '' : noData("Le suivi du trafic référé par les IA nécessite le script Ahrefs Web Analytics installé sur shantitravel.com. Une fois en place, cette section affichera les visites issues de ChatGPT, Perplexity et autres assistants.")}
      </div>
    </div>
  </section>`;
}

function secGA4(d){
  return `
  <section id="ga4">
    <div class="sec-head"><h2>Google Analytics 4</h2><span class="src">Source : Coupler.io (à connecter)</span></div>
    <p class="sec-sub">Sessions, conversions et comportement utilisateur — en attente de la connexion du flux GA4.</p>
    <div class="grid kpis">
      ${kpiCard("Sessions","—",'<span class="delta flat">en attente</span>')}
      ${kpiCard("Utilisateurs","—",'<span class="delta flat">en attente</span>')}
      ${kpiCard("Taux d'engagement","—",'<span class="delta flat">en attente</span>')}
      ${kpiCard("Conversions","—",'<span class="delta flat">en attente</span>')}
    </div>
    <div style="margin-top:14px">${noData("Aucun dataset GA4 n'est encore configuré dans Coupler.io. Une fois le flux créé (GA4 → Coupler.io), cette section affichera sessions, sources, conversions et entonnoirs par mois.")}</div>
  </section>`;
}


/* ==================== CONTRÔLEUR v3 (sheet-driven) ====================
   Data comes from Google Sheet via fetchTabRows/fetchShared.
   Assembled into v1-compatible 'd' objects before rendering.
   ===================================================================== */

const PAGES = [
  {id:"overview", label:"Vue d'ensemble",    fn: (d,prev) => secOverview(d,prev)},
  {id:"vercel",   label:"Trafic Vercel",      fn: (d,prev) => secVercel(d,prev)},
  {id:"gsc",      label:"Performance GSC",    fn: (d,prev) => secGSC(d,prev)},
  {id:"ahrefs",   label:"Ahrefs SEO",         fn: (d,prev) => secAhrefs(d,prev)},
  {id:"links",    label:"Backlinks & Concurrents", fn: (d,prev) => secLinks(d,prev)},
  {id:"kw",       label:"Mots-clés Ahrefs",   fn: (d,prev) => secKw(d,prev)},
  {id:"ai",       label:"Visibilité IA",       fn: (d,prev) => secAI(d,prev)},
  {id:"ga4",      label:"Google Analytics 4", fn: (d,prev) => secGA4(d,prev)}
];

let current = null;
let activePage = "overview";

/* Build a v1-compatible data object from the sheet store */
function assembleMonth(key) {
  const m = loadMonth(key);
  if (!m) return null;

  const v = m.vercel || {};
  const g = m.gsc || {};
  const a = m.ahrefs || {};
  const shared = m.shared || {};

  // Compute ahrefs trend from store for sparkline
  const trendMonths = MONTHS.slice(-3);
  const ahrefsTrend = trendMonths.map(function(mk) {
    const am = STORE.ahrefs[mk.key];
    return { m: mk.label.split(' ')[0], v: am ? (am.kpi && am.kpi.traffic) || 0 : 0 };
  });

  return {
    label: m.label,
    prevLabel: null, // set below
    generated: m.generated || '',
    stamps: m.stamps || {},
    vercel: v.kpi ? {
      kpi: v.kpi,
      prev: null, // set below
      devices: v.devices || [],
      referrers: v.referrers || [],
      pages: v.pages || [],
      countries: v.countries || []
    } : null,
    gsc: g.kpi ? {
      kpi: { clicks: g.kpi.clicks, impressions: g.kpi.impressions, ctr: g.kpi.ctr, position: g.kpi.position },
      prev: null, // set below
      branded: g.branded || { brand:{clicks:0,impr:0,share:0}, nonbrand:{clicks:0,impr:0,share:0} },
      devices: g.devices || [],
      locales: g.locales || [],
      queries: g.queries || [],
      pages: g.pages || [],
      countries: g.countries || [],
      opportunities: g.opportunities || []
    } : null,
    ahrefs: a.kpi ? {
      kpi: {
        traffic: a.kpi.traffic, trafficPrev: null,
        dr: a.kpi.dr, drPrev: null,
        rd: a.kpi.rd, rdPrev: null,
        bl: a.kpi.bl, blPrev: null,
        cost: a.kpi.cost
      },
      buckets: Object.assign({}, a.buckets || {}, { prev: null }),
      movers: a.movers || { up:[], down:[], flat:[] }
    } : null,
    kw: m.kw || null,
    ai: m.ai || null,
    _shared: shared,
    _ahrefsTrend: ahrefsTrend,
    _activeIdx: trendMonths.length - 1
  };
}

/* Inject prev-month data into assembled object */
function injectPrev(d, prevKey) {
  if (!prevKey) return;
  const pm = loadMonth(prevKey);
  if (!pm) return;
  const pv = pm.vercel || {}, pg = pm.gsc || {}, pa = pm.ahrefs || {};
  d.prevLabel = pm.label;
  if (d.vercel && pv.kpi) d.vercel.prev = pv.kpi;
  if (d.gsc && pg.kpi) d.gsc.prev = { clicks: pg.kpi.clicks, impressions: pg.kpi.impressions, ctr: pg.kpi.ctr, position: pg.kpi.position };
  if (d.ahrefs && pa.kpi) {
    d.ahrefs.kpi.trafficPrev = pa.kpi.traffic;
    d.ahrefs.kpi.drPrev      = pa.kpi.dr;
    d.ahrefs.kpi.rdPrev      = pa.kpi.rd;
    d.ahrefs.kpi.blPrev      = pa.kpi.bl;
    d.ahrefs.buckets.prev    = pa.buckets || null;
  }
}

/* Patch render functions to use d._shared and d._ahrefsTrend instead of SHARED */
/* We do this by temporarily aliasing SHARED before each render */
function renderWithShared(d, prev, fn) {
  const s = d._shared || {};
  window.__SHARED = {
    generated: d.generated || '',
    ahrefsTrend: d._ahrefsTrend || [],
    competitors: s.competitors || [],
    refdomains: s.refdomains || []
  };
  const r = fn(d, prev);
  return r;
}

function buildChrome() {
  /* month selector */
  const ms = document.getElementById('monthSwitch');
  ms.innerHTML = MONTHS.map(m =>
    '<button role="tab" data-k="' + m.key + '">' + m.label + '</button>'
  ).join('');
  ms.addEventListener('click', function(e) {
    const b = e.target.closest('button'); if (!b || b.dataset.k === current) return;
    current = b.dataset.k;
    renderAll();
    showPage(activePage);
    window.scrollTo({top:0, behavior:'smooth'});
  });

  /* page tabs */
  const tabs = document.getElementById('pageTabs');
  tabs.innerHTML = PAGES.map(p =>
    '<button class="page-tab" role="tab" data-p="' + p.id + '" aria-selected="false">' + p.label + '</button>'
  ).join('');
  tabs.addEventListener('click', function(e) {
    const b = e.target.closest('.page-tab'); if (!b) return;
    showPage(b.dataset.p);
    window.scrollTo({top:0, behavior:'instant'});
  });
}

function renderAll() {
  const mIdx = MONTHS.findIndex(m => m.key === current);
  const prevKey = mIdx > 0 ? MONTHS[mIdx - 1].key : null;

  const d = assembleMonth(current);
  if (!d) { document.getElementById('pages').innerHTML = '<p style="padding:40px;color:var(--muted)">Données non disponibles pour ce mois.</p>'; return; }
  injectPrev(d, prevKey);

  const prev = prevKey ? assembleMonth(prevKey) : null;

  // Temporarily expose SHARED-compatible object for v1 render functions
  const savedShared = window.SHARED;
  window.SHARED = window.__SHARED = {
    generated: d.generated || '',
    ahrefsTrend: d._ahrefsTrend || [],
    competitors: (d._shared && d._shared.competitors) || [],
    refdomains:  (d._shared && d._shared.refdomains)  || []
  };

  const container = document.getElementById('pages');
  container.innerHTML = PAGES.map(function(p) {
    return '<div class="page" id="page-' + p.id + '" role="tabpanel">' + p.fn(d, prev) + '</div>';
  }).join('');

  window.SHARED = savedShared;

  document.getElementById('pagefoot').innerHTML =
    '<p style="border-top:1px solid var(--line);padding-top:16px">Rapport mensuel — données mises à jour via Google Sheet. GSC &amp; Ahrefs : extraction MCP · Vercel : export manuel · Marque = requêtes contenant « shanti ». Document interne Shanti Travel.</p>';

  document.querySelectorAll('#monthSwitch button')
    .forEach(b => b.classList.toggle('active', b.dataset.k === current));
}

function showPage(id) {
  activePage = id;
  document.querySelectorAll('.page').forEach(function(el) { el.classList.remove('active'); });
  const target = document.getElementById('page-' + id);
  if (target) target.classList.add('active');
  document.querySelectorAll('.page-tab').forEach(function(b) {
    const on = b.dataset.p === id;
    b.classList.toggle('active', on);
    b.setAttribute('aria-selected', on);
  });
}

/* ---- Boot ---- */
async function init() {
  try {
    setStatus('Lecture de l\'index des mois…');
    const gviz = await fetchTab('index');
    const rows = gviz.table.rows;
    MONTHS = rows
      .filter(function(r){ return r.c && r.c[0] && r.c[0].v; })
      .map(function(r){ return { key: String(r.c[0].v), label: r.c[1] && r.c[1].v ? String(r.c[1].v) : String(r.c[0].v) }; });

    if (!MONTHS.length) throw new Error('Onglet index vide — ajoutez au moins un mois.');

    await loadAllData();

    buildChrome();
    current = MONTHS[MONTHS.length - 1].key;
    renderAll();
    showPage('overview');
    document.getElementById('loadingScreen').style.display = 'none';

  } catch(err) {
    console.error(err);
    document.getElementById('loadingScreen').innerHTML =
      '<div class="err-box"><b>Erreur de chargement</b>' +
      'Impossible de lire le Google Sheet.<br><br>' +
      '① Vérifiez que le Sheet est <b>publié sur le web</b> (Fichier → Partager → Publier sur le web → Web page).<br>' +
      '② Vérifiez que l\'onglet <b>index</b> existe avec les mois listés.<br><br>' +
      '<code style="font-size:11px">' + esc(err.message) + '</code></div>';
  }
}

init();

</script>
